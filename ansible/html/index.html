<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Journey</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: backgroundGlow 10s ease infinite;
            font-family: 'Arial', sans-serif;
            color: #fff;
            text-align: center;
            padding: 50px;
            margin: 0;
        }

        @keyframes backgroundGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 3em;
            text-shadow: 0 0 5px #00eaff, 0 0 10px #00eaff, 0 0 15px #00eaff;
        }

        .highlight {
            font-weight: bold;
            font-size: 1.5em;
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: devopsGlow 1.5s infinite alternate;
        }

        @keyframes devopsGlow {
            0% { text-shadow: 0 0 10px #ff6a00, 0 0 20px #ff6a00; }
            100% { text-shadow: 0 0 25px #ee0979, 0 0 35px #ee0979; }
        }

        p {
            font-size: 1.2em;
            margin-top: 20px;
            text-shadow: 0 0 4px #0ff, 0 0 8px #0ff;
        }
    </style>
</head>
<body>
    <h1>Completing The Last Task Of Week 2 Of My <span class="highlight">DevOps Journey</span></h1>
    <p>Stay tuned for more updates!</p>
</body>
</html>
